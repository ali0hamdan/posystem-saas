version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-posuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-pos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-posuser} -d ${POSTGRES_DB:-pos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-posuser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pos}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      TRUST_PROXY: "1"
      SAAS_JWT_SECRET: ${SAAS_JWT_SECRET:?SAAS_JWT_SECRET is required}
      SAAS_ADMIN_EMAIL: ${SAAS_ADMIN_EMAIL:-}
      SAAS_ADMIN_PASSWORD: ${SAAS_ADMIN_PASSWORD:-}
      LICENSE_RSA_PRIVATE_KEY_B64: ${LICENSE_RSA_PRIVATE_KEY_B64:-}
      LICENSE_RSA_PUBLIC_KEY_B64: ${LICENSE_RSA_PUBLIC_KEY_B64:-}
      BYPASS_LICENSE: ${BYPASS_LICENSE:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - pos_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
        VITE_BYPASS_LICENSE: ${VITE_BYPASS_LICENSE:-false}
    restart: always
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - pos_net
    depends_on:
      - api

volumes:
  postgres_data:

networks:
  pos_net:
    driver: bridge
